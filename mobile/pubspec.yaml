name: storycast_ai
description: Transforma livros em experiencias sonoras cinematograficas
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  flutter_riverpod: ^2.5.1
  go_router: ^14.2.0
  dio: ^5.4.3+1
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.3
  just_audio: ^0.9.40
  path_provider: ^2.1.4
  audio_session: ^0.1.21
  file_picker: ^8.0.3
  percent_indicator: ^4.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
