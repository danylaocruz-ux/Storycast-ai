name: Build StoryCast AI APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Configurar Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Criar template Flutter e preparar Android
        run: |
          set -euo pipefail

          echo ">>> 1. flutter create"
          flutter create \
            --project-name storycast_ai \
            --org com.storycastai \
            --platforms android \
            /tmp/flutter_template
          echo "Template OK. Conteudo android:"
          ls /tmp/flutter_template/android/

          echo ">>> 2. Backup manifest"
          cp mobile/android/app/src/main/AndroidManifest.xml /tmp/manifest_custom.xml
          echo "Backup OK"

          echo ">>> 3. rsync boilerplate"
          rsync -a /tmp/flutter_template/android/ mobile/android/
          echo "rsync OK"

          echo ">>> 4. Restaurar manifest"
          cp /tmp/manifest_custom.xml mobile/android/app/src/main/AndroidManifest.xml
          echo "Manifest restaurado"

          echo ">>> 5. Criar file_paths.xml"
          mkdir -p mobile/android/app/src/main/res/xml
          cat > mobile/android/app/src/main/res/xml/file_paths.xml << 'XML'
          <?xml version="1.0" encoding="utf-8"?>
          <paths>
            <external-path name="external_files" path="."/>
            <files-path name="files" path="."/>
            <cache-path name="cache" path="."/>
          </paths>
          XML
          echo "file_paths.xml criado"

          echo ">>> 6. Ajustar minSdk=21"
          sed -i 's/minSdkVersion flutter.minSdkVersion/minSdkVersion 21/' \
            mobile/android/app/build.gradle 2>/dev/null || true
          sed -i 's/minSdk flutter.minSdkVersion/minSdk 21/' \
            mobile/android/app/build.gradle 2>/dev/null || true
          echo "build.gradle:"
          cat mobile/android/app/build.gradle

          echo ">>> 7. Criar dirs assets"
          mkdir -p mobile/assets/images mobile/assets/icons \
                   mobile/assets/animations mobile/assets/fonts
          echo "Todos os passos concluidos com sucesso"

      - name: Instalar dependencias
        working-directory: mobile
        run: flutter pub get

      - name: Aceitar licencas Android
        run: yes | sdkmanager --licenses || true

      - name: Build APK
        working-directory: mobile
        run: |
          flutter build apk --split-per-abi --release 2>&1 | tee /tmp/build.log
          EXIT=${PIPESTATUS[0]}
          [ $EXIT -ne 0 ] && echo "=== ERRO ===" && tail -100 /tmp/build.log
          exit $EXIT

      - name: Upload log se falhou
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: /tmp/build.log
          retention-days: 7

      - name: Upload APK arm64
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: StoryCast-AI-APK
          path: mobile/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
          retention-days: 30

      - name: Upload todos os APKs
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: StoryCast-AI-APK-todos
          path: mobile/build/app/outputs/flutter-apk/*.apk
          retention-days: 30
