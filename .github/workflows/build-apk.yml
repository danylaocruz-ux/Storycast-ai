name: Build StoryCast AI APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Configurar Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Preparar projeto Flutter completo
        run: |
          # Cria projeto Flutter template com boilerplate Android
          flutter create \
            --project-name storycast_ai \
            --org com.storycastai \
            --platforms android \
            /tmp/flutter_template

          # Copia boilerplate Android (build.gradle, settings.gradle, Gradle wrapper, etc.)
          cp -r /tmp/flutter_template/android/* mobile/android/

          # Mantém nosso AndroidManifest.xml personalizado
          cp mobile/android/app/src/main/AndroidManifest.xml \
             /tmp/AndroidManifest_backup.xml || true

          cp /tmp/flutter_template/android/app/src/main/AndroidManifest.xml \
             mobile/android/app/src/main/AndroidManifest.xml

          # Restaura nosso AndroidManifest personalizado
          cp /tmp/AndroidManifest_backup.xml \
             mobile/android/app/src/main/AndroidManifest.xml || true

          # Cria pastas de assets
          mkdir -p mobile/assets/images mobile/assets/icons \
                   mobile/assets/animations mobile/assets/fonts

      - name: Instalar dependências
        working-directory: mobile
        run: flutter pub get

      - name: Gerar código (build_runner)
        working-directory: mobile
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Aceitar licenças Android
        run: yes | sdkmanager --licenses || true

      - name: Build APK
        working-directory: mobile
        run: flutter build apk --split-per-abi --release

      - name: Upload APK (arm64 — celulares modernos)
        uses: actions/upload-artifact@v4
        with:
          name: StoryCast-AI-APK
          path: mobile/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
          retention-days: 30

      - name: Upload todos os APKs
        uses: actions/upload-artifact@v4
        with:
          name: StoryCast-AI-APK-todos
          path: mobile/build/app/outputs/flutter-apk/*.apk
          retention-days: 30
