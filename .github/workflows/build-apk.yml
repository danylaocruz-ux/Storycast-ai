name: Build StoryCast AI APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Configurar Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Montar projeto no diretorio limpo do Flutter
        run: |
          # Cria projeto Flutter completo (com todos os arquivos Android)
          flutter create \
            --project-name storycast_ai \
            --org com.storycastai \
            --platforms android \
            /tmp/storycast_build

          # Substitui lib/ pelo nosso codigo
          rm -rf /tmp/storycast_build/lib
          cp -r mobile/lib /tmp/storycast_build/lib

          # Substitui pubspec.yaml pelo nosso
          cp mobile/pubspec.yaml /tmp/storycast_build/pubspec.yaml

          # Substitui AndroidManifest pelo nosso (com permissoes corretas)
          cp mobile/android/app/src/main/AndroidManifest.xml \
            /tmp/storycast_build/android/app/src/main/AndroidManifest.xml

          # Cria file_paths.xml necessario para FileProvider
          mkdir -p /tmp/storycast_build/android/app/src/main/res/xml
          cat > /tmp/storycast_build/android/app/src/main/res/xml/file_paths.xml << 'XML'
          <?xml version="1.0" encoding="utf-8"?>
          <paths>
            <external-path name="external_files" path="."/>
            <files-path name="files" path="."/>
            <cache-path name="cache" path="."/>
          </paths>
          XML

          # Garante minSdk 21
          sed -i 's/minSdkVersion flutter.minSdkVersion/minSdkVersion 21/' \
            /tmp/storycast_build/android/app/build.gradle 2>/dev/null || true
          sed -i 's/minSdk flutter.minSdkVersion/minSdk 21/' \
            /tmp/storycast_build/android/app/build.gradle 2>/dev/null || true

          echo "Projeto montado em /tmp/storycast_build"
          echo "Lib files:"
          find /tmp/storycast_build/lib -name "*.dart" | wc -l
          echo "pubspec.yaml deps:"
          grep "flutter_riverpod\|go_router\|dio\|just_audio" /tmp/storycast_build/pubspec.yaml

      - name: Instalar dependencias
        working-directory: /tmp/storycast_build
        run: flutter pub get

      - name: Aceitar licencas Android
        run: yes | sdkmanager --licenses || true

      - name: Build APK
        working-directory: /tmp/storycast_build
        run: |
          flutter build apk --split-per-abi --release 2>&1 | tee /tmp/build.log
          EXIT=${PIPESTATUS[0]}
          [ $EXIT -ne 0 ] && echo "=== ERRO BUILD ===" && tail -100 /tmp/build.log
          exit $EXIT

      - name: Upload log se falhou
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: /tmp/build.log
          retention-days: 7

      - name: Upload APK arm64
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: StoryCast-AI-APK
          path: /tmp/storycast_build/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
          retention-days: 30

      - name: Upload todos os APKs
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: StoryCast-AI-APK-todos
          path: /tmp/storycast_build/build/app/outputs/flutter-apk/*.apk
          retention-days: 30
