name: Build StoryCast AI APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Configurar Flutter (latest stable)
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Criar projeto Flutter limpo em /tmp
        run: |
          flutter create \
            --project-name storycast_ai \
            --org com.storycastai \
            --platforms android \
            /tmp/storycast_build

      - name: Copiar lib e pubspec para projeto limpo
        run: |
          rm -rf /tmp/storycast_build/lib
          cp -r mobile/lib /tmp/storycast_build/lib
          cp mobile/pubspec.yaml /tmp/storycast_build/pubspec.yaml

      - name: Copiar AndroidManifest personalizado
        run: |
          cp mobile/android/app/src/main/AndroidManifest.xml \
             /tmp/storycast_build/android/app/src/main/AndroidManifest.xml

      - name: Criar file_paths.xml para FileProvider
        run: |
          mkdir -p /tmp/storycast_build/android/app/src/main/res/xml
          printf '<?xml version="1.0" encoding="utf-8"?>\n<paths>\n  <external-path name="external_files" path="."/>\n  <cache-path name="cache_files" path="."/>\n</paths>\n' \
            > /tmp/storycast_build/android/app/src/main/res/xml/file_paths.xml

      - name: Ajustar compileSdk e minSdk do app
        run: |
          for f in /tmp/storycast_build/android/app/build.gradle /tmp/storycast_build/android/app/build.gradle.kts; do
            if [ -f "$f" ]; then
              sed -i 's/compileSdk = flutter\.compileSdkVersion/compileSdk = 36/g' "$f" || true
              sed -i 's/compileSdkVersion flutter\.compileSdkVersion/compileSdkVersion 36/g' "$f" || true
              sed -i 's/minSdk = flutter\.minSdkVersion/minSdk = 21/g' "$f" || true
              sed -i 's/minSdkVersion flutter\.minSdkVersion/minSdkVersion 21/g' "$f" || true
              sed -i 's/minSdk flutter\.minSdkVersion/minSdk 21/g' "$f" || true
            fi
          done

      - name: Instalar dependências
        working-directory: /tmp/storycast_build
        run: flutter pub get

      - name: Corrigir compileSdk nos plugins via .flutter-plugins
        run: |
          FLUTTER_PLUGINS=/tmp/storycast_build/.flutter-plugins
          echo "=== .flutter-plugins ==="
          cat "$FLUTTER_PLUGINS" 2>/dev/null || echo "arquivo não encontrado"
          echo ""

          if [ -f "$FLUTTER_PLUGINS" ]; then
            while IFS='=' read -r plugin path; do
              # Pular comentários e linhas vazias
              [[ "$plugin" =~ ^# ]] && continue
              [ -z "$plugin" ] && continue
              GRADLE="${path}/android/build.gradle"
              if [ -f "$GRADLE" ]; then
                BEFORE=$(grep -E "compileSdk" "$GRADLE" | head -1 | tr -d ' ')
                sed -i 's/compileSdkVersion [0-9][0-9]*/compileSdkVersion 36/g' "$GRADLE"
                sed -i 's/compileSdk [0-9][0-9]*/compileSdk 36/g' "$GRADLE"
                AFTER=$(grep -E "compileSdk" "$GRADLE" | head -1 | tr -d ' ')
                echo "  $plugin: $BEFORE → $AFTER"
              else
                echo "  $plugin: sem build.gradle em $GRADLE"
              fi
            done < "$FLUTTER_PLUGINS"
          fi

          echo ""
          echo "=== Verificação final file_picker ==="
          FLUTTER_PLUGINS=/tmp/storycast_build/.flutter-plugins
          FP_PATH=$(grep "^file_picker=" "$FLUTTER_PLUGINS" 2>/dev/null | cut -d= -f2-)
          if [ -n "$FP_PATH" ]; then
            grep "compileSdk" "${FP_PATH}/android/build.gradle" || echo "compileSdk não encontrado"
          fi

      - name: Aceitar licenças Android
        run: yes | sdkmanager --licenses || true

      - name: Build APK release
        working-directory: /tmp/storycast_build
        run: flutter build apk --split-per-abi --release 2>&1 | tee /tmp/build.log

      - name: Salvar log de build no repo
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          APK_DIR=/tmp/storycast_build/build/app/outputs/flutter-apk
          if ls "$APK_DIR"/*.apk 1>/dev/null 2>&1; then STATUS="SUCCESS"; ls -lh "$APK_DIR"/*.apk
          else STATUS="FAILED"; fi
          echo "BUILD STATUS: $STATUS"
          LOG=$(tail -100 /tmp/build.log 2>/dev/null || echo "sem log")
          CONTENT=$(printf "STATUS: %s\n\n%s" "$STATUS" "$LOG" | base64 -w 0)
          SHA_OLD=$(curl -s -H "Authorization: Bearer $GH_TOKEN" \
            "https://api.github.com/repos/$GITHUB_REPOSITORY/contents/build-result.txt" \
            2>/dev/null | python3 -c "import sys,json; print(json.load(sys.stdin).get('sha',''))" 2>/dev/null || echo "")
          if [ -n "$SHA_OLD" ]; then
            curl -s -X PUT -H "Authorization: Bearer $GH_TOKEN" \
              "https://api.github.com/repos/$GITHUB_REPOSITORY/contents/build-result.txt" \
              -d "{\"message\":\"ci: build result [skip ci]\",\"content\":\"$CONTENT\",\"sha\":\"$SHA_OLD\"}" | python3 -c "import sys,json; print('committed')"
          else
            curl -s -X PUT -H "Authorization: Bearer $GH_TOKEN" \
              "https://api.github.com/repos/$GITHUB_REPOSITORY/contents/build-result.txt" \
              -d "{\"message\":\"ci: build result [skip ci]\",\"content\":\"$CONTENT\"}" | python3 -c "import sys,json; print('committed')"
          fi

      - name: Upload APK arm64
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: StoryCast-AI-APK
          path: /tmp/storycast_build/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
          if-no-files-found: error
          retention-days: 30

      - name: Upload todos os APKs
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: StoryCast-AI-APK-todos
          path: /tmp/storycast_build/build/app/outputs/flutter-apk/*.apk
          if-no-files-found: error
          retention-days: 30
