name: Build StoryCast AI APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Configurar Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Preparar boilerplate Android completo
        run: |
          flutter create \
            --project-name storycast_ai \
            --org com.storycastai \
            --platforms android \
            /tmp/flutter_template

          cp mobile/android/app/src/main/AndroidManifest.xml /tmp/manifest_custom.xml
          cp -r /tmp/flutter_template/android/. mobile/android/
          cp /tmp/manifest_custom.xml mobile/android/app/src/main/AndroidManifest.xml

          mkdir -p mobile/android/app/src/main/res/xml
          printf '<?xml version="1.0" encoding="utf-8"?>\n<paths xmlns:android="http://schemas.android.com/apk/res/android">\n  <external-path name="external_files" path="."/>\n  <files-path name="files" path="."/>\n  <cache-path name="cache" path="."/>\n</paths>\n' \
            > mobile/android/app/src/main/res/xml/file_paths.xml

          sed -i 's/minSdkVersion flutter.minSdkVersion/minSdkVersion 21/' \
            mobile/android/app/build.gradle 2>/dev/null || true
          sed -i 's/minSdk flutter.minSdkVersion/minSdk 21/' \
            mobile/android/app/build.gradle 2>/dev/null || true

          mkdir -p mobile/assets/images mobile/assets/icons \
                   mobile/assets/animations mobile/assets/fonts

          echo "=== build.gradle ==="
          cat mobile/android/app/build.gradle

      - name: Instalar dependencias
        working-directory: mobile
        run: flutter pub get

      - name: Aceitar licencas Android
        run: yes | sdkmanager --licenses || true

      - name: Build APK (com log completo)
        working-directory: mobile
        run: |
          flutter build apk --split-per-abi --release --verbose \
            2>&1 | tee /tmp/flutter_build.log
          BUILD_EXIT=${PIPESTATUS[0]}
          if [ $BUILD_EXIT -ne 0 ]; then
            echo "=== ULTIMAS 100 LINHAS DO LOG ==="
            tail -100 /tmp/flutter_build.log
            exit $BUILD_EXIT
          fi

      - name: Upload log de erro
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: flutter-build-log
          path: /tmp/flutter_build.log
          retention-days: 7

      - name: Upload APK arm64
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: StoryCast-AI-APK
          path: mobile/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
          retention-days: 30

      - name: Upload todos os APKs
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: StoryCast-AI-APK-todos
          path: mobile/build/app/outputs/flutter-apk/*.apk
          retention-days: 30
