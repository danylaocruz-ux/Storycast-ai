name: Build StoryCast AI APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Configurar Flutter (latest stable)
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Verificar versão Flutter
        run: flutter --version

      - name: Criar projeto Flutter limpo em /tmp
        run: |
          flutter create \
            --project-name storycast_ai \
            --org com.storycastai \
            --platforms android \
            /tmp/storycast_build

      - name: Copiar lib e pubspec para projeto limpo
        run: |
          rm -rf /tmp/storycast_build/lib
          cp -r mobile/lib /tmp/storycast_build/lib
          cp mobile/pubspec.yaml /tmp/storycast_build/pubspec.yaml

      - name: Copiar AndroidManifest personalizado
        run: |
          cp mobile/android/app/src/main/AndroidManifest.xml \
             /tmp/storycast_build/android/app/src/main/AndroidManifest.xml

      - name: Criar file_paths.xml para FileProvider
        run: |
          mkdir -p /tmp/storycast_build/android/app/src/main/res/xml
          printf '<?xml version="1.0" encoding="utf-8"?>\n<paths>\n  <external-path name="external_files" path="."/>\n  <cache-path name="cache_files" path="."/>\n</paths>\n' \
            > /tmp/storycast_build/android/app/src/main/res/xml/file_paths.xml

      - name: Definir minSdk 21
        run: |
          echo "=== Arquivos gradle encontrados ==="
          find /tmp/storycast_build/android -name "*.gradle" -o -name "*.gradle.kts" | sort

          # Groovy DSL (build.gradle)
          if [ -f /tmp/storycast_build/android/app/build.gradle ]; then
            echo "=== build.gradle original (trecho android) ==="
            grep -A5 -B2 "minSdk" /tmp/storycast_build/android/app/build.gradle || echo "(minSdk não encontrado)"
            sed -i 's/minSdkVersion flutter\.minSdkVersion/minSdkVersion 21/g' /tmp/storycast_build/android/app/build.gradle
            sed -i 's/minSdk flutter\.minSdkVersion/minSdk 21/g' /tmp/storycast_build/android/app/build.gradle
            sed -i 's/minSdk = flutter\.minSdkVersion/minSdk = 21/g' /tmp/storycast_build/android/app/build.gradle
          fi

          # Kotlin DSL (build.gradle.kts)
          if [ -f /tmp/storycast_build/android/app/build.gradle.kts ]; then
            echo "=== build.gradle.kts original (trecho android) ==="
            grep -A5 -B2 "minSdk" /tmp/storycast_build/android/app/build.gradle.kts || echo "(minSdk não encontrado)"
            sed -i 's/minSdk = flutter\.minSdkVersion/minSdk = 21/g' /tmp/storycast_build/android/app/build.gradle.kts
            sed -i 's/minSdkVersion(flutter\.minSdkVersion)/minSdkVersion(21)/g' /tmp/storycast_build/android/app/build.gradle.kts
          fi

          echo "=== Resultado final ==="
          find /tmp/storycast_build/android -name "*.gradle*" -exec grep -l "minSdk" {} \; | xargs grep -n "minSdk" || echo "(nenhum arquivo com minSdk encontrado — Flutter default será usado)"

      - name: Instalar dependências
        working-directory: /tmp/storycast_build
        run: flutter pub get

      - name: Aceitar licenças Android
        run: yes | sdkmanager --licenses || true

      - name: Build APK release
        working-directory: /tmp/storycast_build
        run: flutter build apk --split-per-abi --release 2>&1 | tee /tmp/build.log
        continue-on-error: true

      - name: Verificar resultado do build
        run: |
          APK_DIR=/tmp/storycast_build/build/app/outputs/flutter-apk
          if ls "$APK_DIR"/*.apk 1>/dev/null 2>&1; then
            echo "APK GERADO COM SUCESSO!"
            ls -lh "$APK_DIR"/*.apk
          else
            echo "APK NAO ENCONTRADO — build falhou"
            echo "=== ÚLTIMAS 80 LINHAS DO LOG ==="
            tail -80 /tmp/build.log
            exit 1
          fi

      - name: Upload APK arm64 (celulares modernos)
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: StoryCast-AI-APK
          path: /tmp/storycast_build/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
          retention-days: 30

      - name: Upload todos os APKs
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: StoryCast-AI-APK-todos
          path: /tmp/storycast_build/build/app/outputs/flutter-apk/*.apk
          retention-days: 30

      - name: Upload log (em caso de falha)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: /tmp/build.log
          retention-days: 7
